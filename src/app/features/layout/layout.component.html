<div class="layout__container">
  <div class="app__container">
    <app-title></app-title>
  </div>
  <div class="app__container">
    <app-search (submitted)="handleSearch($event)" />
  </div>
  <div class="app__container">
    <div class="video-list__container">

      }
    </div>
  </div>
</div>
