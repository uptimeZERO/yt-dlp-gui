<div class="title__container">
  <p>YT-DLP GUI</p>
  @if (!ytDlpStore.installed()) {
    <p class="title__ytdlp-not-found" (click)="locateYtDlp()">
      yt-dlp not found. Click to locate yt-dlp
    </p>
  } @else {
    <a href="https://github.com/yt-dlp/yt-dlp" target="_blank">yt-dlp v{{ ytDlpStore.version() }}</a>
  }
  <a href="https://github.com/uptimeZERO/yt-dlp-gui" target="_blank">V0.0.1</a>
</div>
