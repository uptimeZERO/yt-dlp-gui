<div class="title__container">

      Click to locate yt-dlp
    </p>
  } @else {
    <p>yt-dlp v{{ ytDlpStore.version() }}</p>
  }
  <a href="https://github.com/uptimeZERO/yt-dlp-gui" target="_blank">V0.0.1</a>
</div>
